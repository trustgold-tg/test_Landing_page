<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact Form</title>

<style>

*{box-sizing:border-box;margin:0;padding:0;font-family:Arial;}

body{background:#f5f7fb;}

.breadcrumb{
background:linear-gradient(120deg,#007bff,#00c6ff);
color:#fff;
text-align:center;
padding:30px;
font-size:26px;
font-weight:bold;
}

.contact-section{
display:flex;
gap:40px;
padding:60px 8%;
align-items:center;
}

/* left */

.contact-left{flex:1;}

.contact-left img{
width:100%;
border-radius:10px;
}

.contact-text{
margin-top:15px;
font-size:18px;
}

.call-btn{
display:inline-block;
margin-top:20px;
padding:12px 25px;
background:#ff6600;
color:#fff;
text-decoration:none;
border-radius:30px;
}

/* form */

.contact-form{
flex:1;
background:#fff;
padding:35px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:6px;
}

button{
width:100%;
padding:15px;
background:#007bff;
color:#fff;
border:none;
border-radius:30px;
font-size:18px;
cursor:pointer;
}

button:hover{background:#0056b3;}

.loader{
display:none;
text-align:center;
color:#007bff;
}

/* responsive */

@media(max-width:900px){
.contact-section{flex-direction:column;}
}

</style>
</head>

<body>

<div class="breadcrumb">Home / Contact</div>

<section class="contact-section">

<div class="contact-left">

<img src="https://images.unsplash.com/photo-1556745757-8d76bdb6984b">

<p class="contact-text">
Need help? Contact our team today.
</p>

<a href="tel:044 4265 4265" class="call-btn">044 4265 4265</a>

</div>

<div class="contact-form">

<h2>Send Message</h2>

<form action="https://formsubmit.co/trustgold.cash@gmail.com" method="POST" id="contactForm">

<input type="hidden" name="_next" value="https://trustgold-tg.github.io/test_Landing_page/thankyou.html">
<input type="hidden" name="_captcha" value="false">

<input type="text" name="name" id="name" placeholder="Your Name" required>

<input type="text" name="phone" id="phone" placeholder="Phone Number" required>

<input type="email" name="email" placeholder="Email Address" required>

<input type="text" name="subject" placeholder="Subject" required>

<textarea name="message" placeholder="Message"></textarea>

<button type="submit">Send Message</button>

<div class="loader">Sending...</div>

</form>

</div>

</section>


<script>

/* name letters only */

document.getElementById("name").addEventListener("input",function(){
this.value=this.value.replace(/[^a-zA-Z ]/g,'');
});

/* phone numbers only */

document.getElementById("phone").addEventListener("input",function(){
this.value=this.value.replace(/[^0-9]/g,'').slice(0,10);
});

/* loader */

document.getElementById("contactForm").addEventListener("submit",function(){
document.querySelector(".loader").style.display="block";
});

</script>

</body>
</html>
